<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BWB Serviços: página em construção." />
    <title>BWB Serviços | Página em construção</title>
    <link rel="icon" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green-950: #092415;
        --ivory-50: #fbf7ee;
        --gold-300: #d8c28e;
        --font-display: "Libre Baskerville", Georgia, serif;
        --font-sans: "Montserrat", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(9, 36, 21, 0) 0%, rgba(9, 36, 21, 0.36) 100%),
          var(--green-950);
        color: var(--ivory-50);
        font-family: var(--font-sans);
        font-weight: 600;
        text-rendering: geometricPrecision;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(251, 247, 238, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(251, 247, 238, 0.04) 1px, transparent 1px);
        background-size: 120px 120px;
        mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.68), transparent 72%);
        pointer-events: none;
      }

      main {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        width: min(760px, calc(100% - 40px));
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(5rem, 19vw, 11.5rem);
        font-weight: 700;
        line-height: 0.84;
      }

      .logo-hub {
        display: grid;
        grid-template-columns: minmax(42px, 1fr) auto minmax(42px, 1fr);
        gap: clamp(16px, 4vw, 34px);
        align-items: center;
        width: min(520px, 82vw);
        margin-top: clamp(16px, 2.5vw, 24px);
        color: rgba(251, 247, 238, 0.78);
      }

      .logo-hub span {
        height: 1px;
        background: currentColor;
      }

      .logo-hub strong {
        color: var(--ivory-50);
        font-size: clamp(1.15rem, 3vw, 2.2rem);
        font-weight: 800;
        line-height: 1;
      }

      p {
        max-width: 420px;
        margin: clamp(42px, 7vw, 64px) 0 0;
        color: var(--gold-300);
        font-size: clamp(0.78rem, 2vw, 0.92rem);
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        main {
          width: min(100% - 32px, 760px);
        }

        h1 {
          font-size: clamp(4.35rem, 26vw, 6.75rem);
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="page-title">
      <h1 id="page-title">BWB</h1>
      <div class="logo-hub" aria-label="BWB Serviços">
        <span></span>
        <strong>Serviços</strong>
        <span></span>
      </div>
      <p>Página em construção</p>
    </main>
  </body>
</html>
